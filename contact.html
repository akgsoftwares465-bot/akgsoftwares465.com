<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - AKG Softwares465</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" />
</head>
<body style="background: #07090f; margin: 0; padding: 0;">

  <!-- Main Content Container -->
  <main style="padding: 120px 20px 80px; max-width: 700px; margin: 0 auto; color: #e2e8f0; font-family: 'Inter', sans-serif;">
    
    <!-- Back Navigation -->
    <a href="index.html" style="color: #3b82f6; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: opacity 0.2s;">
      ← Back to Home
    </a>
    
    <!-- Section Header -->
    <header style="margin-top: 30px; margin-bottom: 40px; text-align: center;">
      <h1 style="font-family: 'Outfit', sans-serif; font-size: 2.8rem; margin-bottom: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800;">
        Let's Start a Project
      </h1>
      <p style="color: #94a3b8; font-size: 1.05rem; max-width: 550px; margin: 0 auto; line-height: 1.6;">
        Have a freelance deployment, KPO operational project, or specialized software requirement? Drop your details below and we will align immediately.
      </p>
    </header>

    <!-- Glassmorphism Contact Form Container -->
    <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 40px; border-radius: 20px; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);">
      
      <!-- Connected Form Endpoint -->
      <form action="https://formsubmit.co/akgsoftwares465@gmail.com" method="POST" style="display: flex; flex-direction: column; gap: 24px;">
        
        <!-- Form configurations -->
        <input type="hidden" name="_subject" value="New Contact Form Submission! (AKG Softwares465)">
        <input type="hidden" name="_template" value="table">
        
        <!-- Name Box -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">
            Full Name
          </label>
          <input type="text" name="Name" placeholder="John Doe" required 
            style="padding: 14px 18px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; color: #ffffff; font-size: 0.95rem; outline: none; font-family: 'Inter', sans-serif;" />
        </div>

        <!-- Email ID Box -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">
            Email ID
          </label>
          <input type="email" name="Email" placeholder="you@company.com" required 
            style="padding: 14px 18px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; color: #ffffff; font-size: 0.95rem; outline: none; font-family: 'Inter', sans-serif;" />
        </div>

        <!-- Message Rich Box -->
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <label style="font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">
            Project Message / Requirements
          </label>
          <textarea name="Message" rows="6" placeholder="Describe your freelance requirement, scope of software development, or specific KPO workflows..." required 
            style="padding: 14px 18px; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; color: #ffffff; font-size: 0.95rem; outline: none; resize: vertical; line-height: 1.6; font-family: 'Inter', sans-serif;"></textarea>
        </div>

        <!-- Submit Button -->
        <button type="submit" 
          style="margin-top: 10px; padding: 16px; background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%); color: #ffffff; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.35); transition: transform 0.2s ease;">
          Send Message →
        </button>

      </form>
    </div>

    <!-- Extra Contact Meta -->
    <footer style="margin-top: 40px; text-align: center; font-size: 0.85rem; color: #475569;">
      <p>Governed under laws of India. Operational hub located in New Delhi, India.</p>
    </footer>

  </main>

</body>
</html>
